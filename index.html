<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --study-blue: #e3f2fd; --health-pink: #fce4ec;
            --money-green: #e8f5e9; --planner-yellow: #fff9c4;
            --text: #333; --border: #eee;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f2f5; color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; min-height: 90vh; }
        
        /* Navigation */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 20px; text-align: center; font-weight: 700; cursor: pointer; transition: 0.3s; color: #888; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8em; }
        .tab.active[data-target="study"] { background: var(--study-blue); color: #1976d2; }
        .tab.active[data-target="health"] { background: var(--health-pink); color: #c2185b; }
        .tab.active[data-target="money"] { background: var(--money-green); color: #388e3c; }
        .tab.active[data-target="planner"] { background: var(--planner-yellow); color: #fbc02d; }

        .content-section { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
        .content-section.active { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Sidebar Inputs */
        .sidebar { background: #fafafa; padding: 20px; border-radius: 15px; border: 1px solid var(--border); align-self: start; }
        h3 { margin: 0 0 20px 0; font-size: 1.2em; color: #555; }
        label { font-size: 0.75em; font-weight: bold; color: #999; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1em; }
        button { background: #333; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #000; transform: translateY(-2px); }

        /* Dashboard Area */
        .dashboard { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        .chart-box { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid var(--border); height: 300px; position: relative; }
        
        /* Table Styling */
        .table-wrapper { overflow-x: auto; background: #fff; border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f9f9f9; color: #666; font-weight: 600; }

        /* Planner Specific */
        #planner.active { display: block; }
        .planner-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 20px; }
        .planner-table th, .planner-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .planner-table td:focus { background: #fffde7; outline: none; }
        .time-col { width: 80px; background: #f5f5f5; font-weight: bold; font-size: 0.8em; }

        @media (max-width: 900px) {
            .content-section.active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="tabs">
        <div class="tab active" data-target="study">Study</div>
        <div class="tab" data-target="health">Health</div>
        <div class="tab" data-target="money">Money</div>
        <div class="tab" data-target="planner">Planner</div>
    </nav>

    <section id="study" class="content-section active">
        <div class="sidebar">
            <h3>Study Log</h3>
            <label>Date</label><input type="date" id="studyDate">
            <label>Subject</label>
            <select id="studySub">
                <option>Math</option><option>MC</option><option>ADA</option>
                <option>DBMS</option><option>BIO</option>
            </select>
            <label>Topic</label><input type="text" id="studyTopic">
            <label>Hours</label><input type="number" id="studyHours" step="0.5">
            <label>Exam Readiness (1-100)</label><input type="number" id="studyReady">
            <button onclick="save('study')">Add Session</button>
        </div>
        <div class="dashboard">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="chart-box"><canvas id="studyPie"></canvas></div>
                <div class="chart-box"><canvas id="studyLine"></canvas></div>
            </div>
            <div class="table-wrapper">
                <table id="studyTable"><thead><tr><th>Date</th><th>Sub</th><th>Topic</th><th>Hrs</th><th>Ready</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </section>

    <section id="health" class="content-section">
        <div class="sidebar">
            <h3>Health Log</h3>
            <label>Date</label><input type="date" id="healthDate">
            <label>Bedtime</label><input type="time" id="bedTime">
            <label>Woke Up</label><input type="time" id="wakeTime">
            <label>Exercise (Mins)</label><input type="number" id="exTime">
            <label>Mood</label><select id="mood"><option>Happy</option><option>Neutral</option><option>Tired</option></select>
            <button onclick="save('health')">Save Data</button>
        </div>
        <div class="dashboard">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="chart-box"><canvas id="sleepBar"></canvas></div>
                <div class="chart-box"><canvas id="exLine"></canvas></div>
            </div>
            <div class="table-wrapper">
                <table id="healthTable"><thead><tr><th>Date</th><th>Sleep</th><th>Exercise</th><th>Mood</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </section>

    <section id="money" class="content-section">
        <div class="sidebar">
            <h3>Expense Log</h3>
            <label>Date</label><input type="date" id="moneyDate">
            <label>Amount</label><input type="number" id="moneyAmt">
            <label>Category</label>
            <select id="moneyCat">
                <option>Food</option><option>Transport</option><option>Education</option><option>Health</option><option>Shopping</option>
            </select>
            <button onclick="save('money')">Save Expense</button>
        </div>
        <div class="dashboard">
            <div class="chart-box"><canvas id="moneyPie"></canvas></div>
            <div class="table-wrapper">
                <table id="moneyTable"><thead><tr><th>Date</th><th>Amount</th><th>Category</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </section>

    <section id="planner" class="content-section">
        <div class="table-wrapper">
            <table class="planner-table">
                <thead><tr><th class="time-col">Time</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead>
                <tbody id="plannerBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
    // Navigation
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
            t.classList.add('active');
            document.getElementById(t.dataset.target).classList.add('active');
            window.dispatchEvent(new Event('resize')); // Fixes chart rendering on tab switch
        });
    });

    let db = JSON.parse(localStorage.getItem('omniDB_v2')) || { study:[], health:[], money:[] };

    function save(type) {
        let entry = { date: document.getElementById(type + 'Date').value || new Date().toLocaleDateString() };
        if(type === 'study') {
            entry.sub = document.getElementById('studySub').value;
            entry.topic = document.getElementById('studyTopic').value;
            entry.hrs = parseFloat(document.getElementById('studyHours').value) || 0;
            entry.ready = document.getElementById('studyReady').value;
        } else if(type === 'health') {
            const b = new Date("2000-01-01 " + document.getElementById('bedTime').value);
            let w = new Date("2000-01-01 " + document.getElementById('wakeTime').value);
            if (w < b) w.setDate(w.getDate() + 1);
            entry.sleep = ((w - b) / 3600000).toFixed(1);
            entry.ex = document.getElementById('exTime').value;
            entry.mood = document.getElementById('mood').value;
        } else if(type === 'money') {
            entry.amt = document.getElementById('moneyAmt').value;
            entry.cat = document.getElementById('moneyCat').value;
        }
        db[type].push(entry);
        localStorage.setItem('omniDB_v2', JSON.stringify(db));
        render();
    }

    let charts = {};
    function render() {
        ['study','health','money'].forEach(t => {
            document.querySelector(`#${t}Table tbody`).innerHTML = db[t].map(e => {
                if(t==='study') return `<tr><td>${e.date}</td><td>${e.sub}</td><td>${e.topic}</td><td>${e.hrs}</td><td>${e.ready}%</td></tr>`;
                if(t==='health') return `<tr><td>${e.date}</td><td>${e.sleep}h</td><td>${e.ex}m</td><td>${e.mood}</td></tr>`;
                if(t==='money') return `<tr><td>${e.date}</td><td>$${e.amt}</td><td>${e.cat}</td></tr>`;
            }).join('');
        });

        if(charts.sPie) Object.values(charts).forEach(c => c.destroy());

        const ctxOptions = { responsive: true, maintainAspectRatio: false };
        
        // Study Charts
        const sData = {}; db.study.forEach(e => sData[e.sub] = (sData[e.sub] || 0) + e.hrs);
        charts.sPie = new Chart(document.getElementById('studyPie'), { type: 'pie', data: { labels: Object.keys(sData), datasets: [{ data: Object.values(sData), backgroundColor: ['#90caf9','#f48fb1','#a5d6a7','#fff176','#ce93d8'] }]}, options: ctxOptions });
        charts.sLine = new Chart(document.getElementById('studyLine'), { type: 'line', data: { labels: db.study.map(e => e.date), datasets: [{ label: 'Readiness', data: db.study.map(e => e.ready), borderColor: '#90caf9' }]}, options: ctxOptions });

        // Health Charts
        charts.slBar = new Chart(document.getElementById('sleepBar'), { type: 'bar', data: { labels: db.health.map(e => e.date), datasets: [{ label: 'Sleep', data: db.health.map(e => e.sleep), backgroundColor: '#f48fb1' }]}, options: ctxOptions });
        charts.exLine = new Chart(document.getElementById('exLine'), { type: 'line', data: { labels: db.health.map(e => e.date), datasets: [{ label: 'Exercise', data: db.health.map(e => e.ex), borderColor: '#f06292' }]}, options: ctxOptions });

        // Money
        const mData = {}; db.money.forEach(e => mData[e.cat] = (mData[e.cat] || 0) + parseFloat(e.amt));
        charts.mPie = new Chart(document.getElementById('moneyPie'), { type: 'pie', data: { labels: Object.keys(mData), datasets: [{ data: Object.values(mData), backgroundColor: ['#a5d6a7','#81c784','#4caf50'] }]}, options: ctxOptions });
    }

    // Planner
    const pBody = document.getElementById('plannerBody');
    for(let i=6; i<=22; i++) {
        let row = `<tr><td class="time-col">${i}:00</td>` + '<td></td>'.repeat(7) + '</tr>';
        pBody.innerHTML += row;
    }
    document.querySelectorAll('.planner-table td').forEach(td => { if(!td.classList.contains('time-col')) td.contentEditable = true; });

    render();
</script>
</body>
</html>
